<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PhoneCam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:         #0a0a0a;
      --surface:    #111;
      --surface2:   #161616;
      --border:     #1e1e1e;
      --text:       #f0f0f0;
      --text-dim:   #3a3a3a;
      --text-mid:   #666;
      --accent:     #e8ff00;
      --green:      #4eff91;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ─── Wait screen ─────────────────────────── */
    #waitScreen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
      transition: opacity 0.5s;
    }

    #waitScreen.hidden { opacity: 0; pointer-events: none; }

    .titlebar { height: 28px; flex-shrink: 0; }

    .wait-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 64px;
      padding: 32px 64px;
      -webkit-app-region: no-drag;
    }

    /* Left: QR + address */
    .connect-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.4s, transform 0.4s;
    }

    .connect-panel.visible { opacity: 1; transform: translateY(0); }

    .qr-wrap {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      line-height: 0;
    }

    .qr-wrap img { width: 148px; height: 148px; border-radius: 4px; }

    .address-block {
      text-align: center;
    }

    .address-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .address-text {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-mid);
      letter-spacing: 0.01em;
    }

    .address-text span { color: var(--accent); font-weight: 500; }

    /* Divider */
    .divider {
      width: 1px;
      height: 160px;
      background: var(--border);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.4s 0.1s;
    }

    .divider.visible { opacity: 1; }

    /* Right: status */
    .status-panel {
      display: flex;
      flex-direction: column;
      gap: 28px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.4s 0.1s, transform 0.4s 0.1s;
    }

    .status-panel.visible { opacity: 1; transform: translateY(0); }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .logo span { color: var(--accent); }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.4s;
    }

    .dot.ready     { background: var(--accent); }
    .dot.streaming { background: var(--green); animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .hint-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .hint-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .hint-num {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    /* ─── Video screen ────────────────────────── */
    #videoScreen {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.6s;
      pointer-events: none;
    }

    #videoScreen.visible {
      opacity: 1;
      pointer-events: all;
    }

    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    /* Overlay on hover */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.25s;
      background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 50%);
      -webkit-app-region: drag;
    }

    #videoScreen:hover #overlay { opacity: 1; }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      border-radius: 100px;
      padding: 6px 14px;
      -webkit-app-region: no-drag;
    }

    .live-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    .live-text {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    .warn-badge {
      display: none;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      border-radius: 100px;
      padding: 6px 14px;
      margin-left: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
      -webkit-app-region: no-drag;
    }

    .warn-badge.visible { display: flex; }
  </style>
</head>
<body>

<!-- ─── Wait screen ─────────────────────────── -->
<div id="waitScreen">
  <div class="titlebar"></div>
  <div class="wait-body">

    <div class="connect-panel" id="connectPanel">
      <div class="qr-wrap">
        <img id="qrImg" src="" alt="QR" />
      </div>
      <div class="address-block">
        <div class="address-label">Open on iPhone</div>
        <div class="address-text" id="addressText">—</div>
      </div>
    </div>

    <div class="divider" id="divider"></div>

    <div class="status-panel" id="statusPanel">
      <div class="logo">Phone<span>Cam</span></div>

      <div class="status-row">
        <div class="dot" id="dot"></div>
        <span class="status-text" id="statusText">Starting...</span>
      </div>

      <div class="hint-list" id="hintList" style="display:none">
        <div class="hint-item">
          <div class="hint-num">1</div>
          Same Wi-Fi network
        </div>
        <div class="hint-item">
          <div class="hint-num">2</div>
          Scan QR or type address
        </div>
        <div class="hint-item">
          <div class="hint-num">3</div>
          Tap "Visit Website" on cert warning
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ─── Video screen ────────────────────────── -->
<div id="videoScreen">
  <video id="remoteVideo" autoplay playsinline></video>
  <div id="overlay">
    <div class="live-badge">
      <div class="live-dot"></div>
      <span class="live-text">Live</span>
    </div>
    <div class="warn-badge" id="warnBadge">Reconnecting...</div>
  </div>
</div>

<script>
const dot          = document.getElementById('dot')
const statusText   = document.getElementById('statusText')
const connectPanel = document.getElementById('connectPanel')
const divider      = document.getElementById('divider')
const statusPanel  = document.getElementById('statusPanel')
const qrImg        = document.getElementById('qrImg')
const addressText  = document.getElementById('addressText')
const hintList     = document.getElementById('hintList')
const waitScreen   = document.getElementById('waitScreen')
const videoScreen  = document.getElementById('videoScreen')
const remoteVideo  = document.getElementById('remoteVideo')
const warnBadge    = document.getElementById('warnBadge')

let pc = null
let pendingCandidates = []

// ── Server ready ──────────────────────────────
window.phonecam.onServerReady(({ ip, phonePort, qr }) => {
  qrImg.src = qr
  addressText.innerHTML = `https://${ip}<span>:${phonePort}</span>`
  connectPanel.classList.add('visible')
  divider.classList.add('visible')
  statusPanel.classList.add('visible')
  dot.className = 'dot ready'
  statusText.textContent = 'Waiting for iPhone'
  hintList.style.display = 'flex'
})

window.phonecam.onPhoneConnected(() => {
  dot.className = 'dot streaming'
  statusText.textContent = 'Connecting...'
})

window.phonecam.onPhoneDisconnected(() => {
  const streaming = pc && pc.connectionState === 'connected'
  if (!streaming) {
    dot.className = 'dot ready'
    statusText.textContent = 'Waiting for iPhone'
    videoScreen.classList.remove('visible')
    waitScreen.classList.remove('hidden')
    if (pc) { pc.close(); pc = null }
  }
})

// ── Signaling via IPC ─────────────────────────
window.phonecam.onPhoneSignal(async (msg) => {
  if (msg.type === 'stream-stop') {
    // iPhone остановил трансляцию — возвращаемся в главное меню
    if (pc) { pc.close(); pc = null }
    remoteVideo.srcObject = null
    videoScreen.classList.remove('visible')
    waitScreen.classList.remove('hidden')
    dot.className = 'dot ready'
    statusText.textContent = 'Waiting for iPhone'
    return
  }

  if (msg.type === 'offer') {
    await handleOffer(msg)
  } else if (msg.candidate !== undefined) {
    if (pc && pc.remoteDescription) {
      await pc.addIceCandidate(new RTCIceCandidate(msg)).catch(() => {})
    } else {
      pendingCandidates.push(msg)
    }
  }
})

// ── WebRTC ────────────────────────────────────
async function handleOffer(offer) {
  if (pc) { pc.close() }
  pendingCandidates = []

  pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  })

  pc.ontrack = (e) => {
    if (e.track.kind === 'video') {
      remoteVideo.srcObject = e.streams[0]
      waitScreen.classList.add('hidden')
      videoScreen.classList.add('visible')
      warnBadge.classList.remove('visible')
      dot.className = 'dot streaming'
      statusText.textContent = 'Streaming'
    }
  }

  pc.onicecandidate = ({ candidate }) => {
    if (candidate) window.phonecam.sendSignal(candidate.toJSON())
  }

  pc.onconnectionstatechange = () => {
    const s = pc.connectionState
    if (s === 'failed' || s === 'disconnected') {
      warnBadge.classList.add('visible')
    } else if (s === 'connected') {
      warnBadge.classList.remove('visible')
    }
  }

  await pc.setRemoteDescription(new RTCSessionDescription(offer))

  for (const c of pendingCandidates) {
    await pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {})
  }
  pendingCandidates = []

  const answer = await pc.createAnswer()
  await pc.setLocalDescription(answer)
  window.phonecam.sendSignal(answer)
}
</script>
</body>
</html>
