<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhoneCam</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #1e1e1e;
      --text: #f0f0f0;
      --text-dim: #444;
      --text-mid: #888;
      --accent: #e8ff00;
      --green: #4eff91;
      --red: #ff4e4e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
      overflow: hidden;
    }

    /* Titlebar space for macOS traffic lights */
    .titlebar {
      height: 28px;
      flex-shrink: 0;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      -webkit-app-region: no-drag;
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 56px;
    }

    .logo span {
      color: var(--accent);
    }

    /* Status dot + label */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 40px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.4s;
    }

    .dot.waiting  { background: var(--text-dim); }
    .dot.ready    { background: var(--accent); }
    .dot.connected { background: var(--green); animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-label {
      font-size: 13px;
      color: var(--text-mid);
      letter-spacing: 0.02em;
    }

    /* Connection card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s, transform 0.4s;
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .card-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .address {
      font-size: 26px;
      font-weight: 300;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .address span {
      color: var(--accent);
      font-weight: 500;
    }

    .hint {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* Connected overlay message */
    .connected-msg {
      font-size: 13px;
      color: var(--green);
      letter-spacing: 0.04em;
      margin-top: 24px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .connected-msg.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="titlebar"></div>

  <div class="content">
    <div class="logo">Phone<span>Cam</span></div>

    <div class="status-row">
      <div class="dot waiting" id="dot"></div>
      <span class="status-label" id="statusLabel">Starting server...</span>
    </div>

    <div class="card" id="card">
      <div class="card-label">Open on iPhone</div>
      <div class="address" id="address">—</div>
      <div class="hint">Same Wi-Fi · tap "Visit Website" on cert warning</div>
    </div>

    <div class="connected-msg" id="connectedMsg">iPhone connected</div>
  </div>

  <script>
    const dot         = document.getElementById('dot')
    const statusLabel = document.getElementById('statusLabel')
    const card        = document.getElementById('card')
    const addressEl   = document.getElementById('address')
    const connectedMsg = document.getElementById('connectedMsg')

    window.phonecam.onServerReady(({ ip, port }) => {
      addressEl.innerHTML = `https://${ip}<span>:${port}</span>`
      card.classList.add('visible')
      dot.className = 'dot ready'
      statusLabel.textContent = 'Waiting for iPhone...'
    })

    window.phonecam.onPhoneConnected(() => {
      dot.className = 'dot connected'
      statusLabel.textContent = 'Streaming'
      connectedMsg.classList.add('visible')
    })

    window.phonecam.onPhoneDisconnected(() => {
      dot.className = 'dot ready'
      statusLabel.textContent = 'Waiting for iPhone...'
      connectedMsg.classList.remove('visible')
    })
  </script>
</body>
</html>
