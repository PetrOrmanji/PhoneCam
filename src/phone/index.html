<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PhoneCam</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --border:   #1e1e1e;
      --text:     #f0f0f0;
      --text-dim: #444;
      --text-mid: #888;
      --accent:   #e8ff00;
      --green:    #4eff91;
      --red:      #ff5c5c;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overscroll-behavior: none;
    }

    /* ── App shell — фиксированная высота, без скролла ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh; /* dynamic viewport height — учитывает Safari toolbar */
      padding-top:    env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      overflow: hidden;
    }

    /* ── Start screen ── */
    #startScreen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 52px;
    }

    .logo span { color: var(--accent); }

    .start-title {
      font-size: 26px;
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      text-align: center;
    }

    .start-sub {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 44px;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 100px;
      padding: 15px 44px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-primary:active { opacity: 0.8; transform: scale(0.97); }

    /* ── Camera screen ── */
    #cameraScreen {
      flex: 1;
      display: none;
      flex-direction: column;
      min-height: 0; /* важно для flex shrink */
    }

    /* Видео — растягивается, но не выталкивает controls */
    #videoWrap {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: #000;
    }

    #preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Статус поверх видео */
    #statusBar {
      position: absolute;
      top: 14px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      pointer-events: none;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }

    .status-dot.connecting { background: var(--accent); }
    .status-dot.live       { background: var(--green); animation: blink 2s infinite; }
    .status-dot.stopped    { background: var(--red); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }

    /* ── Controls panel — фиксированная высота ── */
    #controls {
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 14px 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0; /* никогда не сжимается */
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 7px;
    }

    /* Камеры */
    #cameraList {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    #cameraList::-webkit-scrollbar { display: none; }

    .cam-btn {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-mid);
      font-size: 13px;
      font-weight: 500;
      padding: 7px 16px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .cam-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .cam-btn:active { opacity: 0.7; }

    /* Нижняя строка: качество + стоп/старт */
    .bottom-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .quality-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      overflow: hidden;
    }

    .q-btn {
      background: none;
      border: none;
      color: var(--text-mid);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 7px 16px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .q-btn.active {
      background: var(--accent);
      color: #000;
      border-radius: 100px;
    }

    .q-btn:active { opacity: 0.7; }

    /* Stop / Start кнопка */
    .stop-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-mid);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 7px 18px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .stop-btn.streaming {
      border-color: var(--red);
      color: var(--red);
    }

    .stop-btn:active { opacity: 0.7; }
  </style>
</head>
<body>
<div id="app">

  <!-- Start screen -->
  <div id="startScreen">
    <div class="logo">Phone<span>Cam</span></div>
    <div class="start-title">Allow camera access</div>
    <div class="start-sub">Tap below to grant access<br>and start streaming</div>
    <button class="btn-primary" id="startBtn">Start Camera</button>
  </div>

  <!-- Camera screen -->
  <div id="cameraScreen">
    <div id="videoWrap">
      <video id="preview" autoplay playsinline muted></video>
      <div id="statusBar">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Connecting...</span>
      </div>
    </div>

    <div id="controls">
      <div>
        <div class="section-label">Camera</div>
        <div id="cameraList"></div>
      </div>

      <div class="bottom-row">
        <div>
          <div class="section-label">Quality</div>
          <div class="quality-toggle">
            <button class="q-btn" id="q720" onclick="setQuality('720p')">720p</button>
            <button class="q-btn active" id="q1080" onclick="setQuality('1080p')">1080p</button>
          </div>
        </div>
        <button class="stop-btn" id="stopBtn">Stop</button>
      </div>
    </div>
  </div>

</div>
<script>
// ─── State ────────────────────────────────────
let cameras      = []
let activeCamIdx = 0
let quality      = '1080p'
let stream       = null
let pc           = null
let ws           = null
let reconnectTimer = null
let isStopped    = false

const WS_URL = `wss://${location.host}?type=phone`

// ─── Elements ─────────────────────────────────
const startScreen  = document.getElementById('startScreen')
const cameraScreen = document.getElementById('cameraScreen')
const preview      = document.getElementById('preview')
const cameraList   = document.getElementById('cameraList')
const statusDot    = document.getElementById('statusDot')
const statusText   = document.getElementById('statusText')
const stopBtn      = document.getElementById('stopBtn')

// ─── Start ────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({ video: true, audio: false })
    tmp.getTracks().forEach(t => t.stop())

    await enumerateCameras()
    startScreen.style.display = 'none'
    cameraScreen.style.display = 'flex'

    await startCamera()
    connectSignaling()
  } catch {
    alert('Camera access denied. Please allow camera in Safari settings.')
  }
})

stopBtn.addEventListener('click', () => {
  if (isStopped) {
    resumeStream()
  } else {
    stopStream()
  }
})

// ─── Stop / Resume ────────────────────────────
function stopStream() {
  isStopped = true
  stopBtn.textContent = 'Start'
  stopBtn.classList.remove('streaming')
  setStatus('stopped')

  // Останавливаем треки — на PC застынет и потом уйдёт в меню
  if (stream) stream.getTracks().forEach(t => t.stop())
  stream = null
  preview.srcObject = null

  // Закрываем WebRTC
  if (pc) { pc.close(); pc = null }

  // Сообщаем PC что трансляция остановлена
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'stream-stop' }))
  }
}

async function resumeStream() {
  isStopped = false
  stopBtn.textContent = 'Stop'
  setStatus('connecting')

  await startCamera()
  connectSignaling()
}

// ─── Camera enumeration ───────────────────────
async function enumerateCameras() {
  const devices = await navigator.mediaDevices.enumerateDevices()
  const all = devices.filter(d => d.kind === 'videoinput')

  cameras = []

  for (const d of all) {
    const l = d.label.toLowerCase()

    const isFront   = l.includes('front')     || l.includes('передн')   || l.includes('truedepth')
    const isUltra   = l.includes('ultra')     || l.includes('сверх')
    const isTele    = l.includes('telephoto') || l.includes('телеобъ')
    // Виртуальные мульти-камеры — пропускаем
    const isVirtual = l.includes('triple')    || l.includes('тройная')
                   || l.includes('dual')      || l.includes('двойная')

    if (isTele || isVirtual) continue

    if (isFront) {
      cameras.push({ device: d, label: 'Front' })
    } else if (isUltra) {
      cameras.push({ device: d, label: '0.5x' })
    } else {
      // Любая другая задняя камера = 1x
      // (wide angle, back camera, задняя камера и т.д.)
      cameras.push({ device: d, label: '1x' })
    }
  }


  // Дедупликация: если одинаковый label — оставляем первую
  const seen = new Set()
  cameras = cameras.filter(c => {
    if (seen.has(c.label)) return false
    seen.add(c.label)
    return true
  })

  // Сортировка: 0.5x → 1x → Front
  const order = ['0.5x', '1x', 'Front']
  cameras.sort((a, b) => order.indexOf(a.label) - order.indexOf(b.label))

  // Фолбэк если ничего не нашли
  if (cameras.length === 0) {
    cameras = all.map((d, i) => ({ device: d, label: `Cam ${i + 1}` }))
  }

  // По умолчанию — 1x
  activeCamIdx = cameras.findIndex(c => c.label === '1x')
  if (activeCamIdx < 0) activeCamIdx = 0

  renderCameraList()
}

function renderCameraList() {
  cameraList.innerHTML = ''
  cameras.forEach(({ label }, idx) => {
    const btn = document.createElement('button')
    btn.className = 'cam-btn' + (idx === activeCamIdx ? ' active' : '')
    btn.textContent = label
    btn.addEventListener('click', () => switchCamera(idx))
    cameraList.appendChild(btn)
  })
}

// ─── Camera stream ────────────────────────────
function getConstraints() {
  const [w, h] = quality === '1080p' ? [1920, 1080] : [1280, 720]
  const cam = cameras[activeCamIdx]?.device
  return {
    video: {
      deviceId: cam ? { exact: cam.deviceId } : undefined,
      width:  { ideal: w },
      height: { ideal: h },
      frameRate: { ideal: 60, max: 60 }
    },
    audio: false
  }
}

async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop())
  stream = await navigator.mediaDevices.getUserMedia(getConstraints())
  preview.srcObject = stream

  if (pc) {
    const [videoTrack] = stream.getVideoTracks()
    const sender = pc.getSenders().find(s => s.track?.kind === 'video')
    if (sender) await sender.replaceTrack(videoTrack)
  }
}

async function switchCamera(idx) {
  activeCamIdx = idx
  renderCameraList()
  if (!isStopped) await startCamera()
}

async function setQuality(q) {
  quality = q
  document.getElementById('q720').classList.toggle('active', q === '720p')
  document.getElementById('q1080').classList.toggle('active', q === '1080p')
  if (!isStopped) await startCamera()
}

// ─── WebSocket signaling ──────────────────────
function connectSignaling() {
  clearTimeout(reconnectTimer)
  if (ws) { ws.onclose = null; ws.close() }

  setStatus('connecting')
  ws = new WebSocket(WS_URL)

  ws.onopen = async () => {
    await startPeerConnection()
  }

  ws.onmessage = async (e) => {
    const msg = JSON.parse(e.data)
    if (!pc) return
    if (msg.type === 'answer') {
      await pc.setRemoteDescription(new RTCSessionDescription(msg))
    } else if (msg.candidate) {
      await pc.addIceCandidate(new RTCIceCandidate(msg)).catch(() => {})
    }
  }

  ws.onclose = () => {
    if (!isStopped && pc?.connectionState !== 'connected') {
      reconnectTimer = setTimeout(connectSignaling, 500)
    }
  }

  ws.onerror = () => ws.close()
}

// ─── WebRTC ───────────────────────────────────
async function startPeerConnection() {
  if (pc) pc.close()

  pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  })

  stream.getTracks().forEach(track => pc.addTrack(track, stream))

  pc.onicecandidate = ({ candidate }) => {
    if (candidate && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(candidate))
    }
  }

  pc.onconnectionstatechange = () => {
    const s = pc.connectionState
    if (s === 'connected') {
      setStatus('live')
      stopBtn.classList.add('streaming')
    } else if (s === 'failed') {
      setStatus('connecting')
      connectSignaling()
    } else if (s === 'disconnected') {
      setStatus('connecting')
      connectSignaling()
    }
  }

  const offer = await pc.createOffer()
  await pc.setLocalDescription(offer)
  ws.send(JSON.stringify(offer))
}

// ─── Status ───────────────────────────────────
function setStatus(state) {
  statusDot.className = 'status-dot ' + state
  statusText.textContent = {
    connecting: 'Connecting...',
    live:       'Live',
    stopped:    'Stopped',
  }[state] ?? state
}
</script>
</body>
</html>
